<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Format Plus</title>
    <style>
      :root {
        color: #1d2433;
        background: #f6f8fb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        border-bottom: 1px solid #d9e0ea;
        background: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 4px;
        color: #526070;
        font-size: 12px;
      }

      select {
        min-width: 132px;
        padding: 8px 10px;
        border: 1px solid #c8d1dd;
        border-radius: 6px;
        background: #ffffff;
        color: #1d2433;
      }

      #sql-example {
        min-width: 220px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 0;
      }

      .pane {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        min-height: 0;
      }

      .pane-title {
        padding: 10px 20px;
        border-bottom: 1px solid #d9e0ea;
        background: #edf2f7;
        color: #526070;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      textarea,
      pre {
        width: 100%;
        height: 100%;
        min-height: 420px;
        margin: 0;
        padding: 20px;
        border: 0;
        outline: 0;
        overflow: auto;
        font:
          14px/1.55 'SFMono-Regular',
          Consolas,
          'Liberation Mono',
          monospace;
      }

      textarea {
        resize: none;
        background: #ffffff;
      }

      .pane:first-child {
        border-right: 1px solid #d9e0ea;
      }

      pre {
        white-space: pre;
        background: #101828;
        color: #e7edf7;
      }

      @media (max-width: 760px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .pane:first-child {
          border-right: 0;
          border-bottom: 1px solid #d9e0ea;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>SQL Format Plus</h1>
        <div class="controls">
          <label>
            Example
            <select id="sql-example">
              <option value="0">Basic filtering</option>
              <option value="1">JOIN with aggregation</option>
              <option value="2">CTE and window function</option>
              <option value="3">N1QL nested data</option>
              <option value="4">DB2 pagination</option>
              <option value="5">PL/SQL block</option>
            </select>
          </label>
          <label>
            Language
            <select id="sql-language">
              <option value="sql">SQL</option>
              <option value="n1ql">N1QL</option>
              <option value="db2">DB2</option>
              <option value="pl/sql">PL/SQL</option>
            </select>
          </label>
          <label>
            Indent
            <select id="sql-indent">
              <option value="  ">2 spaces</option>
              <option value="    ">4 spaces</option>
              <option value="	">Tab</option>
            </select>
          </label>
        </div>
      </header>
      <section class="workspace">
        <section class="pane" aria-label="SQL input">
          <div class="pane-title">Input</div>
          <textarea id="sql-input" spellcheck="false"></textarea>
        </section>
        <section class="pane" aria-label="Formatted SQL output">
          <div class="pane-title">Formatted</div>
          <pre id="sql-output"></pre>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
